name: threads-check

# 일회성 진단: GitHub Actions(클라우드) IP에서 Threads API 가 닿는지 확인
on:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Threads me 호출
        env:
          TH: ${{ secrets.THREADS_TOKEN }}
        run: |
          echo "=== /me ==="
          curl -s "https://graph.threads.net/v1.0/me?fields=id,username&access_token=$TH"
          echo ""
