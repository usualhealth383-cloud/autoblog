name: daily-autoblog

# 매일 약 06:13 KST (= 21:13 UTC 전날) 자동 생성·발행·보고
# 정각(:00)은 전 세계 작업이 몰려 잘 밀리므로 일부러 비정각으로 잡음(정시성↑).
on:
  schedule:
    - cron: "13 21 * * *"
  workflow_dispatch: {}   # 수동 실행 버튼(테스트용)

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 생성 이미지를 저장소에 푸시(공개 URL 호스팅)
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 비밀 파일 생성
        run: |
          mkdir -p config
          cat > config/client_secret.json <<'EOF'
          ${{ secrets.BLOGGER_CLIENT_SECRET }}
          EOF
          cat > config/token.json <<'EOF'
          ${{ secrets.BLOGGER_TOKEN }}
          EOF
          printf '%s' '${{ secrets.TELEGRAM_CHAT_IDS }}' > config/telegram_chats.json
          # 혹시 모를 UTF-8 BOM 제거(JSON 파싱 오류 방지)
          sed -i '1s/^\xEF\xBB\xBF//' config/client_secret.json config/token.json config/telegram_chats.json

      - name: 자동 발행 실행
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          OPENAI_MODEL: gpt-4o
          IMAGE_MODEL: gpt-image-1
          IMAGE_QUALITY: high
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          # 수익화: 제휴(없으면 빈 값 → 조용히 애드센스만)
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          SECURITIES_AFFILIATE_URL: ${{ secrets.SECURITIES_AFFILIATE_URL }}
          SECURITIES_AFFILIATE_TEXT: ${{ secrets.SECURITIES_AFFILIATE_TEXT }}
          TRANSLATE_TO_ENGLISH: "true"
          TARGET_GEO: KR
          TIMEZONE: Asia/Seoul
          PYTHONPATH: src
          PYTHONUNBUFFERED: "1"
        run: python scripts/daily_publish.py
