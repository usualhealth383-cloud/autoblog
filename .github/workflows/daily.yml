name: daily-autoblog

# 외부 스케줄러(cron-job.org)가 매일 06:00 KST 에 workflow_dispatch 로 실행시킨다.
# (GitHub 자체 schedule 은 신뢰성이 낮아 제거함)
on:
  workflow_dispatch: {}

# 외부 cron-job.org가 짧은 간격으로 중복 트리거해도 1개만 돌고 나머지는 자동 취소(비용 폭주 방지)
concurrency:
  group: daily-autoblog
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 생성 이미지를 저장소에 푸시(공개 URL 호스팅)
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 비밀 파일 생성
        run: |
          mkdir -p config
          cat > config/client_secret.json <<'EOF'
          ${{ secrets.BLOGGER_CLIENT_SECRET }}
          EOF
          cat > config/token.json <<'EOF'
          ${{ secrets.BLOGGER_TOKEN }}
          EOF
          printf '%s' '${{ secrets.TELEGRAM_CHAT_IDS }}' > config/telegram_chats.json
          # 혹시 모를 UTF-8 BOM 제거(JSON 파싱 오류 방지)
          sed -i '1s/^\xEF\xBB\xBF//' config/client_secret.json config/token.json config/telegram_chats.json

      - name: 자동 발행 실행
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # 이미지 API 업로드용
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}   # GPT+Gemini 교차검수(없으면 자동 건너뜀)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          OPENAI_MODEL: gpt-4o
          IMAGE_MODEL: gpt-image-1
          IMAGE_QUALITY: medium
          MAX_IMAGES: "5"   # 섹션마다 사진(본문 ~2000자). 무료 스톡 우선이라 대부분 무료
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          # 스레드(usual_sense) 자동 게시
          THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          # 인스타그램(usual_sense) 자동 게시
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          # 수익화: 제휴(없으면 빈 값 → 조용히 애드센스만)
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          SECURITIES_AFFILIATE_URL: ${{ secrets.SECURITIES_AFFILIATE_URL }}
          SECURITIES_AFFILIATE_TEXT: ${{ secrets.SECURITIES_AFFILIATE_TEXT }}
          # 광고: 본문 중간 인-아티클 애드센스(둘 다 있을 때만 삽입, 블로거 발행본 한정)
          ADSENSE_CLIENT: ${{ secrets.ADSENSE_CLIENT }}
          ADSENSE_SLOT: ${{ secrets.ADSENSE_SLOT }}
          TRANSLATE_TO_ENGLISH: "false"
          TARGET_GEO: KR
          TIMEZONE: Asia/Seoul
          PYTHONPATH: src
          PYTHONUNBUFFERED: "1"
        run: python scripts/daily_publish.py
